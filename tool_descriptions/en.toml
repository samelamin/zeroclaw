Output: <function>{"name": "slack_post", "description": "...", "parameters": {...}}</function>
'''
success = "Output contains a <function> block with the tool's full JSON schema with success=true."
failure = "Returns success=false with 'no deferred tools matched query' or 'MCP registry unavailable'."

