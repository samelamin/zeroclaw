[security_ops]
purpose = "Perform managed security operations: triage alerts, run incident-response playbooks, parse vulnerability scans, and generate security reports."
when = "Use for structured cybersecurity workflows. Do not use for network configuration or firewall changes — this tool is analysis and response only."
example = '''
Input:  {"action": "triage_alert", "alert": {"type": "brute_force", "source_ip": "203.0.113.42", "count": 342}}
Output: Severity: HIGH. Recommendation: block 203.0.113.42 at perimeter firewall. Playbook: incident-brute-force.
'''
success = "Output contains a severity rating and a recommended action or report with success=true."
failure = "Returns success=false with 'action not recognized', 'playbook not found', or 'alert schema invalid'."

[shell]
purpose = "Execute a shell command in the workspace directory and return stdout, stderr, and exit code."
when = "Use for commands and multi-step operations that no dedicated tool covers. Prefer file_read for reading files, git_operations for git, and content_search for searching — shell is the fallback for everything else."
example = '''
Input:  {"command": "cargo test --lib 2>&1 | tail -5"}
Output: test result: ok. 47 passed; 0 failed; 0 ignored; 0 measured; 0 filtered out
'''
success = "Output contains the command's stdout/stderr with success=true; exit code 0 means success."
failure = "Returns success=false with 'command blocked by security policy', 'requires approval in supervised mode', or the command's own stderr on non-zero exit."

[sop_advance]
purpose = "Report the result of the current SOP step and advance to the next step in the run."
when = "Use within an active SOP run to complete a step and receive the next instruction. Do not use to start an SOP — use sop_execute for that."
example = '''
Input:  {"run_id": "run_abc123", "succeeded": true, "output": "Database backup completed: 142 MB"}
Output: Next step (3/5): Verify backup integrity by running pg_restore --list backup.sql
'''
success = "Output contains the next step instruction (or 'SOP complete') with success=true."
failure = "Returns success=false with 'run_id not found', 'run already completed', or 'step requires approval before advancing'."

[sop_approve]
purpose = "Approve a pending SOP step that is waiting for operator authorization before proceeding."
when = "Use to unblock an SOP run that paused at an approval gate. Do not use to view pending approvals — use sop_status for that."
example = '''
Input:  {"run_id": "run_abc123", "step_id": "step_3"}
Output: Step 3 approved. Instruction: Run ALTER TABLE users ADD COLUMN last_login TIMESTAMP;
'''
success = "Output contains the approved step's instruction text with success=true."
failure = "Returns success=false with 'run_id not found', 'step does not require approval', or 'operator not authorized'."

[sop_execute]
purpose = "Manually trigger a Standard Operating Procedure by name and receive the first step instruction."
when = "Use to start an SOP run. Do not use for subsequent steps — use sop_advance for those. Do not use to list available SOPs — use sop_list."
example = '''
Input:  {"sop_name": "deploy-to-production"}
Output: Run started: run_abc123. Step 1/5: Run cargo build --release and confirm exit code 0.
'''
success = "Output contains a run_id and the first step instruction with success=true."
failure = "Returns success=false with 'SOP not found: deploy-to-production', 'SOP already has active run', or 'trigger conditions not met'."

[sop_list]
purpose = "List all loaded Standard Operating Procedures with their triggers, priority, step count, and active run count."
when = "Use to discover available SOPs before triggering one. Do not use to check run status — use sop_status for that."
example = '''
Input:  {}
Output: [{"name": "deploy-to-production", "trigger": "on_deploy", "steps": 5, "active_runs": 0, "priority": "high"}]
'''
success = "Output is a JSON array of SOP descriptors (possibly empty) with success=true."
failure = "Returns success=false with 'SOP registry not loaded' or 'config file parse error'."

[sop_status]
purpose = "Query the execution status of one or all active SOP runs."
when = "Use to check whether a run is waiting for approval or has completed. Do not use to list available SOPs — use sop_list for that."
example = '''
Input:  {"run_id": "run_abc123"}
Output: {"run_id": "run_abc123", "sop": "deploy-to-production", "current_step": 3, "status": "waiting_approval"}
'''
success = "Output is a JSON status object with run_id, current step, and status string with success=true."
failure = "Returns success=false with 'run_id not found' or 'no active runs'."

[swarm]
purpose = "Orchestrate multiple agents collaboratively using sequential (pipeline), parallel (fan-out/fan-in), or router strategies."
when = "Use when a task can be decomposed into independent or staged sub-tasks that benefit from parallel or specialized execution. Do not use for single-model delegation — use delegate for that."
example = '''
Input:  {"strategy": "parallel", "agents": [{"prompt": "Summarize chapter 1"}, {"prompt": "Summarize chapter 2"}], "merge_prompt": "Combine the two summaries into one coherent overview"}
Output: Chapter 1: ... Chapter 2: ... Combined: ...
'''
success = "Output contains each agent's result and (for parallel/router) the merged final answer with success=true."
failure = "Returns success=false with 'no agents specified', 'router failed to select an agent', or 'sub-agent timed out after 120s'."

[tool_search]
purpose = "Fetch full JSON schema definitions for deferred MCP tools so they can be invoked."
when = "Use when a tool name appears in the system reminder as 'deferred' and you need its parameter schema before calling it. Do not use to look up native tool schemas — those are always available."
